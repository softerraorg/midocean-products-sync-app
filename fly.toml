# Fly.io configuration for Midocean Products Sync
# This file is generated by `fly launch` and can be customized

app = "midocean-products-sync"  # Change this to your app name
primary_region = "iad"  # Change to your preferred region

[build]

[env]
  NODE_ENV = "production"

# Process configuration
# Run scheduler as a long-running worker process
[processes]
  scheduler = "node src/scheduler.js"

# Resource limits
[resources]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Note: This is a worker process that doesn't need HTTP services
# The scheduler runs continuously and handles its own scheduling
# For manual syncs, use: fly ssh console -C "node src/syncFromSupplierAPI.js"

